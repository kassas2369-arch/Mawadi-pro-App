<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mawadi-Pro ERP + Barcode</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family: 'Segoe UI', Arial, sans-serif; background:#eef2f7; padding:15px; direction: rtl;}
.container{background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); max-width: 800px; margin: auto;}
table{width:100%; border-collapse:collapse; margin-top:10px; background: white;}
th,td{border:1px solid #ddd; padding:10px; text-align:center;}
th{background:#007bff; color:#fff;}
button{margin:3px; padding:8px 12px; border:none; border-radius:5px; background:#007bff; color:#fff; cursor:pointer; font-weight: bold;}
input,select{padding:8px; margin:3px; border: 1px solid #ccc; border-radius: 5px; width: 80%; max-width: 300px;}
.logo{width:80px; border-radius:10px; margin-bottom: 10px;}
#loginBox{max-width:350px; margin:auto; margin-top:80px; text-align:center;}

#missingPage { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: #f4f4f4; z-index: 9999; padding: 20px;}
#printableArea { background: white; width: 210mm; min-height: 290mm; margin: auto; padding: 20mm; box-sizing: border-box; border: 1px solid #eee;}
.pdf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #007bff; padding-bottom: 15px; margin-bottom: 20px;}
.pdf-table { width: 100%; border: 1px solid #000; border-collapse: collapse; }
.pdf-table th { background: #f2f2f2 !important; color: black !important; border: 1px solid #000; }
.pdf-table td { border: 1px solid #000; padding: 10px; }

#reader { width: 100%; max-width: 400px; margin: auto; display: none; border: 2px solid #007bff; border-radius: 10px; overflow: hidden; }
.qty-controls { display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-qty { width: 30px; height: 30px; padding: 0; line-height: 30px; }
.btn-plus { background: #28a745; }
.btn-minus { background: #dc3545; }
</style>
</head>

<body>

<div id="loginBox" class="container">
    <h3>🔐 تسجيل الدخول</h3>
    <input id="user" placeholder="اسم المستخدم (admin)"><br>
    <input id="pass" type="password" placeholder="كلمة السر (1234)"><br>
    <button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">
    <div style="text-align:center; margin-bottom:10px">
        <img id="logoPreview" class="logo" src="https://cdn-icons-png.flaticon.com/512/1162/1162456.png"><br>
        <h2 id="shopName">مغازة الغزالة</h2>
        <input id="shopInput" placeholder="اسم المحل الجديد">
        <button onclick="saveShopName()">💾 حفظ الاسم</button>
    </div>

    <div class="container" style="text-align: center;">
        <div id="reader"></div> 
        <button onclick="startScanner()" style="background:#28a745; width: 90%;">📸 فتح ماسح الباركود</button>
        <button id="stopBtn" onclick="stopScanner()" style="display:none; background:#dc3545; width: 90%;">❌ إغلاق الكاميرا</button>
        <br><br>
        <input id="name" placeholder="اسم المادة (مثلاً: حليب)">
        <input id="code" placeholder="كود الباركود">
        <input id="four" placeholder="اسم المزود">
        <select id="supplierDropdown" onchange="selectSupplier()" style="width: 85%;">
            <option value="">اختر مزوداً سابقاً</option>
        </select>
        <button onclick="addMaterial()" style="width: 90%; margin-top: 10px;">➕ إضافة للنواقص</button>
        <br><br>
        <input id="searchInput" placeholder="🔍 بحث بالاسم أو الكود..." oninput="renderTable()" style="width: 70%;">
        <button onclick="resetSearch()">🔄 Reset</button>
        <h4 id="counterBox">عدد المواد: 0</h4>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
            <input type="file" id="excelFile" accept=".xlsx" style="display:none" onchange="importExcel(event)">
            <button onclick="document.getElementById('excelFile').click()" style="background: #17a2b8;">📥 Import Excel</button>
            <button onclick="exportExcelFile()" style="background: #fd7e14;">📤 Export Excel</button>
            <button onclick="backupJSON()">💾 Backup</button>
            <button onclick="restoreJSON()" style="background: #6f42c1;">♻️ Restore</button>
        </div>
        <button onclick="showMissingPage()" style="background:#28a745; width: 90%; margin-top: 10px;">📋 صفحة النواقص (PDF/WhatsApp)</button>

        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>الاسم</th>
                    <th>المزود</th>
                    <th>الكمية (نقص)</th>
                    <th>تعديل/حذف</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>
</div>

<div id="missingPage">
    <div id="printableArea">
        <div class="pdf-header">
            <div style="text-align: right;"><h2 id="shopName2" style="margin:0; color:#007bff;"></h2><p id="dateTime"></p></div>
            <img id="logoPreview2" class="logo" src="https://cdn-icons-png.flaticon.com/512/1162/1162456.png">
        </div>
        <div style="text-align:center; background:#007bff; color:white; padding:10px; margin:20px 0;"><h3>قائمة طلبات المواد الناقصة</h3></div>
        <div id="supplierTitle" style="font-weight:bold; margin-bottom:10px;"></div>
        <table class="pdf-table">
            <thead><tr><th>المادة</th><th>الكود</th><th>الكمية</th></tr></thead>
            <tbody id="missingTable"></tbody>
        </table>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <select id="filterSupplier" onchange="renderMissingTable()"></select><br>
        <button onclick="exportMissingPDF()" style="background:#dc3545">📥 تحميل PDF</button>
        <button onclick="shareMissingPageWhatsApp()" style="background:#25D366">📱 WhatsApp</button>
        <button onclick="closeMissingPage()" style="background:#666">رجوع</button>
    </div>
</div>

<script>
let materials = JSON.parse(localStorage.getItem("materials") || "[]");
let html5QrCode;

function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;
    if(u === "admin" && p === "1234"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        loadData();
    } else { alert("خطأ في بيانات الدخول"); }
}

function startScanner() {
    document.getElementById("reader").style.display = "block";
    document.getElementById("stopBtn").style.display = "inline-block";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 150 } },
        (decodedText) => {
            document.getElementById("code").value = decodedText;
            document.getElementById("searchInput").value = decodedText;
            renderTable();
            stopScanner();
        }
    ).catch(err => alert("الكاميرا لا تعمل: " + err));
}

function stopScanner() {
    if(html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById("reader").style.display = "none";
            document.getElementById("stopBtn").style.display = "none";
        });
    }
}

function addMaterial() {
    const n = document.getElementById("name").value;
    if(!n) return alert("يرجى إدخال اسم المادة");
    materials.push({ 
        id: Date.now(), 
        name: n, 
        code: document.getElementById("code").value, 
        four: document.getElementById("four").value,
        qty: 1 
    });
    saveAndRefresh();
    clearInputs();
}

function changeQty(id, val) {
    const m = materials.find(x => x.id === id);
    if(m) {
        m.qty = Math.max(0, (m.qty || 0) + val);
        saveAndRefresh();
    }
}

function saveAndRefresh() {
    localStorage.setItem("materials", JSON.stringify(materials));
    renderTable();
    updateSuppliersList();
}

function renderTable() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const tbody = document.getElementById("table");
    tbody.innerHTML = "";
    materials.filter(m => m.name.toLowerCase().includes(search) || (m.code && m.code.toLowerCase().includes(search))).forEach(m => {
        tbody.innerHTML += `<tr>
            <td>${m.code || '-'}</td>
            <td>${m.name}</td>
            <td>${m.four || '-'}</td>
            <td>
                <div class="qty-controls">
                    <button class="btn-qty btn-minus" onclick="changeQty(${m.id}, -1)">-</button>
                    <span style="font-weight:bold; margin: 0 10px;">${m.qty || 0}</span>
                    <button class="btn-qty btn-plus" onclick="changeQty(${m.id}, 1)">+</button>
                </div>
            </td>
            <td>
                <button style="background:#ffc107; color:black; padding: 5px;" onclick="editMaterial(${m.id})">📝</button>
                <button style="background:#dc3545; padding: 5px;" onclick="deleteMaterial(${m.id})">🗑️</button>
            </td>
        </tr>`;
    });
    document.getElementById("counterBox").innerText = "عدد المواد: " + materials.length;
}

function editMaterial(id) {
    const m = materials.find(x => x.id === id);
    const n = prompt("تعديل اسم المادة:", m.name);
    if(n) {
        m.name = n; 
        m.code = prompt("تعديل الكود:", m.code); 
        m.four = prompt("تعديل المزود:", m.four);
        saveAndRefresh();
    }
}

function deleteMaterial(id) {
    if(confirm("هل أنت متأكد من الحذف؟")) { materials = materials.filter(m => m.id !== id); saveAndRefresh(); }
}

function selectSupplier() { 
    const val = document.getElementById("supplierDropdown").value;
    if(val !== "all") document.getElementById("four").value = val; 
}

function updateSuppliersList() {
    const sups = [...new Set(materials.map(m => m.four))].filter(s => s);
    ["supplierDropdown", "filterSupplier"].forEach(id => {
        const el = document.getElementById(id);
        if(el) {
            el.innerHTML = '<option value="all">كل المزودين</option>';
            sups.forEach(s => el.innerHTML += `<option value="${s}">${s}</option>`);
        }
    });
}

function showMissingPage() {
    document.getElementById("app").style.display="none";
    document.getElementById("missingPage").style.display="block";
    document.getElementById("dateTime").innerText = "التاريخ: " + new Date().toLocaleString('ar-TN');
    renderMissingTable();
}

function renderMissingTable() {
    const sup = document.getElementById("filterSupplier").value;
    document.getElementById("supplierTitle").innerText = "المزود: " + (sup === "all" ? "الكل" : sup);
    const tbody = document.getElementById("missingTable");
    tbody.innerHTML = "";
    materials.filter(m => (sup === "all" || m.four === sup) && m.qty > 0).forEach(m => {
        tbody.innerHTML += `<tr><td>${m.name}</td><td>${m.code || '-'}</td><td>${m.qty}</td></tr>`;
    });
}

function exportMissingPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    html2canvas(document.getElementById("printableArea")).then(canvas => {
        const img = canvas.toDataURL('image/png');
        const w = doc.internal.pageSize.getWidth();
        const h = (canvas.height * w) / canvas.width;
        doc.addImage(img, 'PNG', 0, 0, w, h);
        doc.save("Nawakis.pdf");
    });
}

function shareMissingPageWhatsApp() {
    const sup = document.getElementById("filterSupplier").value;
    const sName = localStorage.getItem("shopName") || "المحل";
    let msg = `*قائمة نواقص: ${sName}*\n-------------------\n`;
    materials.filter(m => (sup === "all" || m.four === sup) && m.qty > 0).forEach(m => {
        msg += `• ${m.name} | الكمية: ${m.qty}\n`;
    });
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function saveShopName() { 
    const name = document.getElementById("shopInput").value;
    if(name) {
        localStorage.setItem("shopName", name); 
        loadData(); 
        alert("تم حفظ اسم المحل");
    }
}

function loadData() {
    const n = localStorage.getItem("shopName") || "مغازة الغزالة";
    document.getElementById("shopName").innerText = n; 
    document.getElementById("shopName2").innerText = n;
    renderTable(); 
    updateSuppliersList();
}

function exportExcelFile() {
    if(materials.length === 0) return alert("لا يوجد بيانات لتصديرها");
    const ws = XLSX.utils.json_to_sheet(materials);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "Mawadi_Pro_Data.xlsx");
}

function importExcel(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        try {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type:'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            materials = XLSX.utils.sheet_to_json(firstSheet);
            saveAndRefresh();
            alert("تم استيراد البيانات بنجاح");
        } catch(err) { alert("خطأ في قراءة ملف الإكسل"); }
    };
    r.readAsArrayBuffer(e.target.files[0]);
}

function backupJSON() {
    const dataStr = JSON.stringify(materials);
    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
    const a = document.createElement('a');
    a.setAttribute("href", dataUri);
    a.setAttribute("download", "Mawadi_Backup.json");
    a.click();
}

function restoreJSON() {
    const i = document.createElement('input'); i.type = 'file';
    i.onchange = e => {
        const r = new FileReader();
        r.onload = ev => { 
            try {
                materials = JSON.parse(ev.target.result); 
                saveAndRefresh(); 
                alert("تم استعادة البيانات");
            } catch(err) { alert("ملف غير صالح"); }
        };
        r.readAsText(e.target.files[0]);
    };
    i.click();
}

function clearInputs() { 
    document.getElementById("name").value=""; 
    document.getElementById("code").value=""; 
    document.getElementById("four").value=""; 
}
function closeMissingPage() { 
    document.getElementById("missingPage").style.display="none"; 
    document.getElementById("app").style.display="block"; 
}
function resetSearch() { 
    document.getElementById("searchInput").value = ""; 
    renderTable(); 
}
</script>

</body>
</html>
