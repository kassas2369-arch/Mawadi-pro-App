<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغازة الغزالة - النواقص</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; text-align: center; padding: 10px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .btn-green { background: #28a745; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://cdn-icons-png.flaticon.com/512/1162/1162456.png" width="80">
        <h2>مغازة الغزالة</h2>
        <div id="reader" style="width: 100%; display:none;"></div>
        <button class="btn-green" onclick="startScan()">📸 فتح ماسح الباركود</button>
        <input type="text" id="itemName" placeholder="اسم المادة">
        <input type="text" id="itemCode" placeholder="الكود">
        <button onclick="addItem()">➕ إضافة للنواقص</button>
        <table>
            <thead><tr><th>المادة</th><th>الكود</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script>
        function startScan() {
            document.getElementById('reader').style.display='block';
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('itemCode').value = txt;
                scanner.stop();
                document.getElementById('reader').style.display='none';
            });
        }
        function addItem() {
            const name = document.getElementById('itemName').value;
            const code = document.getElementById('itemCode').value;
            if(name && code) {
                document.getElementById('tableBody').innerHTML += `<tr><td>${name}</td><td>${code}</td></tr>`;
                document.getElementById('itemName').value = ''; document.getElementById('itemCode').value = '';
            }
        }
    </script>
</body>
</html>
